name: Node.js CI

on:
  push:
    branches:
      - '*'
    tags:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run test:src
        env:
          CI: true

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm ci
      - run: npm run lint
        env:
          CI: true

  typecheck:
    runs-on: ubuntu-latest
    name: TypeScript Type Check

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm ci
      - name: Run TypeScript type checking
        run: npx tsc --noEmit
        env:
          CI: true
      - name: Build dist (test:types imports the built dist/index.js)
        # build:lib (gulp compile) generates src/entry/*.generated.js, which
        # tsup needs to bundle dist/. Generated entries are gitignored, so a
        # clean checkout must generate them before bundling.
        run: npm run build:lib && npm run compile
        env:
          CI: true
      - name: Run TypeScript type tests
        run: npm run test:types
        env:
          CI: true

  # WASM/Rust/AssemblyScript was split out to the MathTS repo (commit e62bcd749);
  # the validate:wasm/build:wasm scripts and src/wasm* were removed, so this job
  # was deleted along with its `needs:` reference in build-and-test below.

  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm ci
      - run: npm run coverage
        env:
          CI: true
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # Don't fail CI when the Codecov upload fails (e.g. no CODECOV_TOKEN
          # secret on the fork) — coverage upload is informational, not a gate.
          fail_ci_if_error: false

  build-and-test:
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm ci
      - run: npm run build-and-test
        env:
          CI: true
